document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

· Last {{ activeN }} Matches<\u002Fh3>\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;\">\n            <sc-for list=\"{{ compareCards }}\" as=\"cc\" hint-placeholder-count=\"3\">\n              <div style=\"background:oklch(15% 0.015 260);border-radius:8px;padding:14px 16px;\">\n                <p style=\"font-weight:600;font-size:14px;margin:0 0 10px;font-family:'Space Grotesk',sans-serif;\">{{ cc.label }}<\u002Fp>\n                <sc-raw-table style=\"width:100%;font-size:13px;border-collapse:collapse;\">\n                  <sc-raw-tbody>\n                    <sc-raw-tr><sc-raw-td style=\"padding:3px 0;color:oklch(65% 0.03 260);\">Winrate<\u002Fsc-raw-td><sc-raw-td style=\"text-align:right;font-weight:600;\">{{ cc.winrate }}<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                    <sc-raw-tr><sc-raw-td style=\"padding:3px 0;color:oklch(65% 0.03 260);\">Record<\u002Fsc-raw-td><sc-raw-td style=\"text-align:right;\">{{ cc.record }}<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                    <sc-raw-tr><sc-raw-td style=\"padding:3px 0;color:oklch(65% 0.03 260);\">Avg KDA<\u002Fsc-raw-td><sc-raw-td style=\"text-align:right;\">{{ cc.kda }}<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                  <\u002Fsc-raw-tbody>\n                <\u002Fsc-raw-table>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ showViewToggle }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;gap:8px;align-items:center;margin-bottom:20px;\">\n            <span style=\"font-size:12px;color:oklch(65% 0.03 260);letter-spacing:0.05em;margin-right:4px;\">CHART VIEW:<\u002Fspan>\n            <sc-for list=\"{{ viewModeOptions }}\" as=\"vm\" hint-placeholder-count=\"2\">\n              <div sc-camel-on-click=\"{{ vm.select }}\" style=\"font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer;color:{{ vm.color }};background:{{ vm.bg }};font-weight:500;\">\n                {{ vm.label }}\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:36px;\">\n          <sc-for list=\"{{ metricCards }}\" as=\"m\" hint-placeholder-count=\"5\">\n            <div style=\"background:oklch(20% 0.02 260);border-radius:10px;padding:16px;border:1px solid oklch(28% 0.02 260);\">\n              <p style=\"font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 8px;\">{{ m.label }}<\u002Fp>\n              <p style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;margin:0;color:{{ m.color }};\">{{ m.value }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ chartsVisible }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-bottom:36px;background:oklch(20% 0.02 260);border-radius:12px;padding:18px 20px;border:1px solid oklch(28% 0.02 260);\">\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 12px;\">Win / Loss Streak <span style=\"opacity:0.6;text-transform:none;\">{{ chartModeLabel }}<\u002Fspan><\u002Fp>\n          <div style=\"position:relative;width:100%;height:100px;\"><canvas ref=\"{{ streakRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:36px;background:oklch(20% 0.02 260);border-radius:12px;padding:18px 20px;border:1px solid oklch(28% 0.02 260);\">\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 12px;\">KDA Ratio Trend <span style=\"opacity:0.6;text-transform:none;\">{{ chartModeLabel }}<\u002Fspan><\u002Fp>\n          <div style=\"position:relative;width:100%;height:260px;\"><canvas ref=\"{{ kdaRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:20px;background:oklch(20% 0.02 260);border-radius:12px;padding:18px 20px;border:1px solid oklch(28% 0.02 260);\">\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 12px;\">Winrate By Hero (2+ Games)<\u002Fp>\n          <div style=\"position:relative;width:100%;height:{{ heroChartHeight }}px;\"><canvas ref=\"{{ heroRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ chartsVisible }}\" hint-placeholder-val=\"{{ true }}\">\n        <sc-if value=\"{{ singlePlayerMode }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-bottom:20px;background:oklch(20% 0.02 260);border-radius:12px;padding:18px 20px;border:1px solid oklch(28% 0.02 260);\">\n            <p style=\"font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 12px;\">Avg Last Hits By Hero <span style=\"opacity:0.6;text-transform:none;\">{{ detailChartsNote }}<\u002Fspan><\u002Fp>\n            <sc-if value=\"{{ hasLhData }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:relative;width:100%;height:{{ heroChartHeight }}px;\"><canvas ref=\"{{ lhRef }}\"><\u002Fcanvas><\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasLhData }}\" hint-placeholder-val=\"{{ true }}\">\n              <p style=\"font-size:13px;color:oklch(55% 0.02 260);margin:0;padding:20px 0;\">No detail data available yet — still fetching per-match stats for recent games.<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:20px;background:oklch(20% 0.02 260);border-radius:12px;padding:18px 20px;border:1px solid oklch(28% 0.02 260);\">\n            <p style=\"font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 12px;\">Avg Hero Damage By Hero <span style=\"opacity:0.6;text-transform:none;\">{{ detailChartsNote }}<\u002Fspan><\u002Fp>\n            <sc-if value=\"{{ hasDmgData }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:relative;width:100%;height:{{ heroChartHeight }}px;\"><canvas ref=\"{{ dmgRef }}\"><\u002Fcanvas><\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasDmgData }}\" hint-placeholder-val=\"{{ true }}\">\n              <p style=\"font-size:13px;color:oklch(55% 0.02 260);margin:0;padding:20px 0;\">No detail data available yet — still fetching per-match stats for recent games.<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:20px;background:oklch(20% 0.02 260);border-radius:12px;padding:18px 20px;border:1px solid oklch(28% 0.02 260);\">\n            <p style=\"font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 12px;\">Avg Net Worth By Hero <span style=\"opacity:0.6;text-transform:none;\">{{ detailChartsNote }}<\u002Fspan><\u002Fp>\n            <sc-if value=\"{{ hasNwData }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:relative;width:100%;height:{{ heroChartHeight }}px;\"><canvas ref=\"{{ nwRef }}\"><\u002Fcanvas><\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasNwData }}\" hint-placeholder-val=\"{{ true }}\">\n              <p style=\"font-size:13px;color:oklch(55% 0.02 260);margin:0;padding:20px 0;\">No detail data available yet — still fetching per-match stats for recent games.<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ togetherMode }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:20px;background:oklch(20% 0.02 260);border-radius:12px;padding:18px 20px;border:1px solid oklch(28% 0.02 260);\">\n            <p style=\"font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:oklch(65% 0.03 260);margin:0 0 16px;\">Games Played Together, Same Team <span style=\"opacity:0.6;text-transform:none;\">(searched last 500 each · {{ sharedCount }} shown · record {{ togetherRecord }})<\u002Fspan><\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:10px;\">\n              <sc-for list=\"{{ sharedMatches }}\" as=\"sm\" hint-placeholder-count=\"3\">\n                <div style=\"background:oklch(15% 0.015 260);border-radius:8px;padding:12px 16px;\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;\">\n                    <span style=\"font-size:11px;color:oklch(65% 0.03 260);\">{{ sm.date }} · Match {{ sm.matchId }}<\u002Fspan>\n                    <sc-if value=\"{{ sm.sameTeam }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"font-weight:600;font-size:13px;color:{{ sm.matchResultColor }};\">{{ sm.matchResult }}<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:4px;\">\n                    <sc-for list=\"{{ sm.rows }}\" as=\"row\" hint-placeholder-count=\"2\">\n                      <div style=\"display:flex;align-items:center;gap:12px;font-size:13px;\">\n                        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;min-width:90px;\">{{ row.label }}<\u002Fspan>\n                        <span style=\"color:oklch(65% 0.03 260);min-width:120px;\">{{ row.hero }}<\u002Fspan>\n                        <span style=\"color:oklch(65% 0.03 260);min-width:70px;\">{{ row.kda }}<\u002Fspan>\n                        <span style=\"color:oklch(65% 0.03 260);min-width:70px;\">{{ row.side }}<\u002Fspan>\n                        <sc-if value=\"{{ sm.opposingTeam }}\" hint-placeholder-val=\"{{ false }}\">\n                          <span style=\"font-weight:600;color:{{ row.resultColor }};\">{{ row.result }}<\u002Fspan>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fsc-if><\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;togetherHeroBarSize&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.7,&quot;min&quot;:0.5,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Together Hero Chart&quot;},&quot;detailHeroBarSize&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1.3,&quot;min&quot;:0.5,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Together Hero Chart&quot;}}\">\nconst ACCENT_HEX = '#4fd2e8';\nconst ACCENT_MAGENTA = '#e04fd2';\nconst WIN = '#3fe08a';\nconst LOSS = '#ff5c6e';\nconst GRID = 'rgba(255,255,255,0.06)';\nconst TEXT = '#a9a8b8';\nconst PLAYER_COLORS = ['#4fd2e8', '#e04fd2', '#f5c451', '#7cffb2'];\n\nfunction makeMetricValueLabelPlugin(fmt) {\n  return {\n    id: 'metricValueLabel',\n    afterDatasetsDraw(chart) {\n      const { ctx } = chart;\n      chart.data.datasets.forEach((ds, di) => {\n        const meta = chart.getDatasetMeta(di);\n        if (meta.hidden) return;\n        meta.data.forEach((bar, i) => {\n          const val = ds.data[i];\n          if (!val) return;\n          ctx.save();\n          ctx.font = '600 11px sans-serif';\n          const label = fmt(val);\n          const textW = ctx.measureText(label).width;\n          const inside = bar.width > textW + 16;\n          ctx.textAlign = inside ? 'right' : 'left';\n          ctx.textBaseline = 'middle';\n          ctx.fillStyle = inside ? '#0d0d14' : TEXT;\n          const x = inside ? bar.x - 6 : bar.x + 6;\n          ctx.fillText(label, x, bar.y);\n          ctx.restore();\n        });\n      });\n    }\n  };\n}\n\nconst barValueLabelPlugin = {\n  id: 'barValueLabel',\n  afterDatasetsDraw(chart) {\n    const { ctx } = chart;\n    chart.data.datasets.forEach((ds, di) => {\n      const meta = chart.getDatasetMeta(di);\n      if (meta.hidden) return;\n      meta.data.forEach((bar, i) => {\n        const val = ds.data[i];\n        if (val === null || val === undefined || val === 0) return;\n        ctx.save();\n        ctx.font = '600 11px sans-serif';\n        ctx.fillStyle = '#0d0d14';\n        ctx.textBaseline = 'middle';\n        const label = Math.round(val) + '%';\n        const textW = ctx.measureText(label).width;\n        const inside = bar.width > textW + 16;\n        ctx.textAlign = inside ? 'right' : 'left';\n        ctx.fillStyle = inside ? '#0d0d14' : TEXT;\n        const x = inside ? bar.x - 6 : bar.x + 6;\n        ctx.fillText(label, x, bar.y);\n        ctx.restore();\n      });\n    });\n  }\n};\n\nclass Component extends DCLogic {\n  state = { loading: true, error: null, loadingLabel: 'Loading match data from OpenDota...', players: [], selectedIndices: [0], activeN: 30, viewMode: 'together' };\n  charts = {};\n  streakRef = React.createRef();\n  kdaRef = React.createRef();\n  heroRef = React.createRef();\n  dmgRef = React.createRef();\n  nwRef = React.createRef();\n  lhRef = React.createRef();\n\n  async componentDidMount() {\n    const mod = await import(window.__resources ? window.__resources.dashboardData : './dashboard-data.js');\n    this.mod = mod;\n    const hardTimeout = new Promise((_, reject) => setTimeout(() => reject(new Error('Timed out waiting for OpenDota (25s)')), 25000));\n    try {\n      const players = await Promise.race([\n        mod.loadAllPlayers((p, i, completed) => {\n          this.setState({ loadingLabel: `Loading matches... (${completed}/${mod.PLAYERS.length} players done)` });\n        }),\n        hardTimeout\n      ]);\n      this.setState({ loading: false, players, selectedIndices: [mod.DEFAULT_PLAYER], activeN: mod.DEFAULT_N });\n      Promise.all(players.filter(p => !p.unavailable).map(p => mod.enrichRecentWithDetails(p))).then(() => this.forceUpdate());\n    } catch (err) {\n      this.setState({ loading: false, error: 'Could not load data from OpenDota (' + err.message + '). Check that \"Expose Public Match Data\" is enabled in Dota 2 settings, or try reloading.' });\n    }\n  }\n\n  componentDidUpdate() { this.buildCharts(); }\n\n  destroyChart(id) { if (this.charts[id]) { this.charts[id].destroy(); delete this.charts[id]; } }\n\n  getCombinedEnriched() {\n    const mod = this.mod;\n    const { players, selectedIndices, activeN } = this.state;\n    const chosen = selectedIndices.length ? selectedIndices : [0];\n    const combined = chosen.flatMap(i => (players[i] ? players[i].enriched.slice(-activeN) : []));\n    combined.sort((a, b) => a.end_time - b.end_time);\n    return combined;\n  }\n\n  getSelectedPlayersSliced() {\n    const { activeN } = this.state;\n    return this.getSelectedPlayers().map(p => ({ ...p, enriched: p.enriched.slice(-activeN) }));\n  }\n\n  // Together mode always searches each player's full fetched history (not the Last-N filter),\n  // since a deeper pool finds more shared games regardless of each player's recent solo activity.\n  getTogetherSharedSameTeam() {\n    const mod = this.mod;\n    const shared = mod.findSharedMatches(this.getSelectedPlayers());\n    return shared.filter(s => s.entries.every(e => e.radiant === s.entries[0].radiant)).sort((a, b) => a.end_time - b.end_time);\n  }\n\n  getTogetherSameTeamEnriched() {\n    return this.getTogetherSharedSameTeam().map(s => ({\n      win: s.entries[0].win,\n      kills: s.entries.reduce((a, e) => a + e.kills, 0),\n      deaths: s.entries.reduce((a, e) => a + e.deaths, 0),\n      assists: s.entries.reduce((a, e) => a + e.assists, 0),\n      hero: s.entries.map(e => e.hero).join(' + '),\n      end_time: s.end_time\n    }));\n  }\n\n  // Flattened per-player entries (for hero winrate breakdown) from shared same-team games.\n  getTogetherFlatHeroEntries() {\n    return this.getTogetherSharedSameTeam().flatMap(s => s.entries);\n  }\n\n  // Per-player chronological match lists, scoped to shared same-team games only.\n  getTogetherPerPlayerLists() {\n    const shared = this.getTogetherSharedSameTeam();\n    const byLabel = new Map();\n    shared.forEach(s => {\n      s.entries.forEach(e => {\n        if (!byLabel.has(e.label)) byLabel.set(e.label, []);\n        byLabel.get(e.label).push(e);\n      });\n    });\n    return this.getSelectedPlayers().map(p => ({ label: p.label, list: byLabel.get(p.label) || [] }));\n  }\n\n  getSelectedPlayers() {\n    const { players, selectedIndices } = this.state;\n    const chosen = selectedIndices.length ? selectedIndices : [0];\n    return chosen.map(i => players[i]).filter(Boolean);\n  }\n\n  buildCharts() {\n    if (this.state.loading || this.state.error || !this.mod) return;\n    if (!this.streakRef.current) return;\n    if (this.state.viewMode !== 'combine' && this.getSelectedPlayers().length > 1) {\n      this.buildTogetherCharts();\n    } else {\n      this.buildCombinedCharts(this.getCombinedEnriched());\n    }\n  }\n\n  buildCombinedCharts(enriched, heroEntries) {\n    const mod = this.mod;\n    if (!enriched.length) return;\n\n    this.destroyChart('streak');\n    this.charts.streak = new Chart(this.streakRef.current, {\n      type: 'bar',\n      data: { labels: enriched.map((_, i) => i + 1), datasets: [{ data: enriched.map(e => e.win ? 1 : -1), backgroundColor: enriched.map(e => e.win ? WIN : LOSS), borderRadius: 2, barPercentage: 0.85 }] },\n      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => enriched[ctx.dataIndex].win ? 'Win' : 'Loss' } } }, scales: { x: { display: false }, y: { display: false, min: -1.2, max: 1.2 } } }\n  = []; if (h.avgLH !== null) parts.push(`LH: ${h.avgLH.toFixed(0)}`); if (h.avgDmg !== null) parts.push(`Dmg: ${Math.round(h.avgDmg)}`); if (h.avgNW !== null) parts.push(`NW: ${Math.round(h.avgNW)}`); if (h.avgXPM !== null) parts.push(`XPM: ${Math.round(h.avgXPM)}`); return parts.join(' · '); }\n          } } },\n          scales: { x: { grid: { color: GRID }, ticks: { color: TEXT, callback: (v) => v + '%' }, min: 0, max: 100 }, y: { grid: { display: false }, ticks: { color: TEXT, font: { size: 11 } } } } }\n      });\n    }\n  }\n\n  togglePlayer(idx) {\n    this.setState(s => {\n      const has = s.selectedIndices.includes(idx);\n      let next = has ? s.selectedIndices.filter(i => i !== idx) : [...s.selectedIndices, idx];\n      if (!next.length) next = [idx]; // keep at least one selected\n      return { selectedIndices: next };\n    });\n  }\n  selectN(n) { this.setState({ activeN: n }); }\n  setViewMode(m) { this.setState({ viewMode: m }); }\n\n  renderVals() {\n    const { loading, error, players, selectedIndices, activeN } = this.state;\n    const ready = !loading && !error;\n    if (!ready) {\n      return { loading, error, loadingLabel: this.state.loadingLabel, ready };\n    }\n    const mod = this.mod;\n    const togetherModeForStats = selectedIndices.length > 1 && this.state.viewMode !== 'combine';\n    const enriched = togetherModeForStats ? this.getTogetherSameTeamEnriched() : this.getCombinedEnriched();\n    const stats = mod.computeStats(enriched);\n    const heroes = mod.heroBreakdown(enriched);\n\n    const playerTabs = players.map((pl, i) => {\n      const s = mod.computeStats(pl.enriched.slice(-activeN));\n      const active = selectedIndices.includes(i);\n      return {\n        label: pl.label + (pl.unavailable ? ' (unavailable)' : ''), winrate: pl.unavailable ? '' : s.winrate.toFixed(0) + '%',\n        color: active ? '#0d0d14' : (pl.unavailable ? '#6a6978' : '#c9c8d6'),\n        bg: active ? ACCENT_HEX : 'oklch(20% 0.02 260)',\n        border M !== null ? Math.round(stats.avgXPM) : '—', color: ACCENT_HEX }\n    ];\n\n    const selectedCount = selectedIndices.length;\n    const compareMode = selectedIndices.length > 1;\n    const viewModeOptions = [\n      { key: 'together', label: 'Together', active: this.state.viewMode === 'together', select: () => this.setViewMode('together') },\n      { key: 'combine', label: 'Combined', active: this.state.viewMode === 'combine', select: () => this.setViewMode('combine') }\n    ].map(o => ({\n      ...o,\n      color: o.active ? '#0d0d14' : '#c9c8d6',\n      bg: o.active ? ACCENT_HEX : 'oklch(20% 0.02 260)'\n    }));\n    const togetherMode = compareMode && this.state.viewMode !== 'combine';\n    const chartModeLabel = togetherMode ? '(same-team games together)' : '(' + selectedCount + ' combined)';\n\n    let sharedMatches = [];\n    let togetherRecord = null;\n    let togetherHeroCount = 0;\n    if (togetherMode) {\n      const shared = this.getTogetherSharedSameTeam();\n      const perPlayerNames = new Set();\n      this.getTogetherPerPlayerLists().forEach(p => mod.heroBreakdown(p.list).forEach(h => perPlayerNames.add(h.name)));\n      togetherHeroCount = perPlayerNames.size;\n      const wins = shared.filter(s => s.entries[0].win).length;\n      togetherRecord = wins + 'W - ' + (shared.length - wins) + 'L';\n      sharedMatches = shared.slice(-10).reverse().map(s => ({\n        matchId: s.matchId,\n        date: new Date(s.end_time * 1000).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),\n        sameTeam: true,\n        opposingTeam: false,\n        matchResult: s.entries[0].win ? 'Win' : 'Loss',\n        matchResultColor: s.entries[0].win ? '#3fe08a' : '#ff5c6e',\n        rows: s.entries.map(e => ({\n          label: e.label, hero: e.hero,\n          kda: e.kills + ' / ' + e.deaths + ' / ' + e.assists,\n          resultColor: e.win ? '#3fe08a' : '#ff5c6e',\n          result: e.win ? 'Win' : 'Loss',\n          side: e.radiant ? 'Radiant' : 'Dire'\n        }))\n      }));\n    }\n\n    return {\n      loading, error, ready, activeN,\n      loadingLabel: this.state.loadingLabel,\n      playerTabs, compareCards, filters, metricCards, selectedCount: selectedIndices.length,\n      showViewToggle: compareMode, viewModeOptions, chartModeLabel, togetherMode, sharedMatches, sharedCount: sharedMatches.length, togetherRecord, chartsVisible: true,\n      heroChartHeight: Math.max(160, (togetherMode ? togetherHeroCount : heroes.length) * 22 * (togetherMode ? (this.props.togetherHeroBarSize ?? 1) : 1) + 60),\n      streakRef: this.streakRef, kdaRef: this.kdaRef, heroRef: this.heroRef,\n      dmgRef: this.dmgRef, nwRef: this.nwRef, lhRef: this.lhRef,\n      detailChartsNote: '(Last ' + mod.DETAIL_STATS_WINDOW + ' games with detail data)',\n      singlePlayerMode: selectedIndices.length === 1,\n      hasDmgData: selectedIndices.length === 1 && !!this.hasHeroMetricData('avgDmg'),\n      hasNwData: selectedIndices.length === 1 && !!this.hasHeroMetricData('avgNW'),\n      hasLhData: selectedIndices.length === 1 && !!this.hasHeroMetricData('avgLH')\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
